name: general-publishing
target_platform: general
tone: clear and careful
max_title_length: 56
max_paragraph_length: 260

rules:
  - id: forbidden_terms
    enabled: true
    severity: error
    terms:
      - 违规词
      - 敏感词
      - 禁用词
    allow_terms: []

  - id: absolute_claims
    enabled: true
    severity: warning
    terms:
      - 绝对安全
      - 永久有效
      - 零风险
      - 100% 有效
      - 保证成功
      - 唯一选择
    allow_terms: []

  - id: markdown_structure
    enabled: true

  - id: markdown_links_images
    enabled: true

regex_rules:
  - id: draft_placeholder
    pattern: "TODO|TBD|待补充|这里补充|占位"
    severity: warning
    message: "Remove placeholder text before publishing."
    suggestion: "Replace the placeholder with final content or remove it."
    case_sensitive: false

  - id: overconfident_wording
    pattern: "毫无疑问|不用担心|完全没有问题"
    severity: info
    message: "This wording may sound more certain than the draft can support."
    suggestion: "Use a more specific and supportable description."
    case_sensitive: false
