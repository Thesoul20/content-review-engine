name: marketing-copy
target_platform: marketing
tone: clear and persuasive
max_title_length: 42
max_paragraph_length: 200

rules:
  - id: forbidden_terms
    enabled: true
    severity: error
    terms:
      - 违规词
      - 敏感词
      - 禁用词
    allow_terms: []

  - id: absolute_claims
    enabled: true
    severity: warning
    terms:
      - 行业第一
      - 全网最强
      - 绝对安全
      - 永久有效
      - 零风险
      - 保证成功
      - 唯一选择
      - 立刻见效
    allow_terms: []

  - id: markdown_links_images
    enabled: true

regex_rules:
  - id: guaranteed_outcome
    pattern: "保证|包过|稳赚|必然|一定有效|立刻见效"
    severity: error
    message: "This wording may imply a guaranteed outcome."
    suggestion: "Use qualified wording and provide evidence where appropriate."
    case_sensitive: false

  - id: unverifiable_superlative
    pattern: "行业第一|全网第一|顶级|最先进|最权威"
    severity: warning
    message: "This wording may be difficult to verify."
    suggestion: "Use specific, supportable claims instead."
    case_sensitive: false

  - id: pressure_tactic
    pattern: "仅限今天|最后机会|错过再等一年|马上下单|立刻抢购"
    severity: info
    message: "This phrase may read as a pressure tactic."
    suggestion: "Consider a calmer call to action with concrete terms."
    case_sensitive: false
